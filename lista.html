<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #F4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        /* cabeçalho principal */
        h1{
            font-size: 2.5rem;
            color: #00bcd4;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        h2{
            font-size: 1.8rem;
            color: #00bcd4;
            margin: 20px 0 ;
            text-transform: uppercase;
        }

    </style>
</head>
<body>
    <style>
        ol, ul, dl{
            margin: 0;
            padding: 0;
            list-style-type: inside;
            width: 100%;
            max-width: 600px;
        }
        ol li ul li{
            background-color: #FFFFFFFF;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        ol li:hover, ul li:hover{
            transform: translatey(-5px);
            background-color: #00bcd4;
            color: #FFFFFFFF;
        }
        /* Lista de Definição */
        dl dt{
            font-weight: bold;
            color: #00bcd4;
            margin-top: 20px; 
        }
    </style>
    <h1>Listas</h1>
    <!-- Lista não ordenada -->
     <h2>Aprovados</h2>
     <ol>
        <li>Bia</li>
        <li>pedro</li>
        <li>Ana</li>
        <li>João</li>
     </ol>

     <!-- Lista não ordenada -->
      <ul>
        <li>Queijo</li>
        <li>leite</li>
        <li>arroz</li>
        <li>pão</li>
      </ul>
      <!-- lista de fefinição -->
       <h2>Principais termos do glossário de Cloud Computing</h2>
       <dl>
            <dt>Baa5</dt>
            <dd>Backend Como Serviço</dd>
            <dt>Iaa5</dt>
            <dd>Infraestrutura Como Serviço</dd>
            <dt>Paa5</dt>
            <dd>Plataforma Como Serviço</dd>
            <dt>Saa5</dt>
            <dd>Software Como Serviço</dd>
       </dl>
</body>
</html>
