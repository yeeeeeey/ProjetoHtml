<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        /*Estilo geral da tabela*/
        table{
            width: 80%;
            margin: 50px auto;
            border-collapse:collapse;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
        }
        caption{
            font-size: 1.8rem;
            font-weight: bold;
            color: #00bcd5;
            margin-bottom: 20px;
        }
        th,td{
            padding: 20px;
            text-align: left;
            font-size: 1rem;
            border-bottom: 1px solid #ccc;
        }
        th{
            background-color: #00bcd4;
            color: #fff;
            text-transform: uppercase;
        }
        thead tr{
            border-bottom: 3px solid #333;

        }
        tbody tr:hover{
            background-color: #e0f7fa;
        }
        tfoot tr{
            background-color: #e0f7fa;
        }
        tfoot td{
         border-top: 2px solid #333;        }
    </style>
</head>
<body>
    <table>
        <caption>Produtos</caption>
        <thead>
            <tr>
                <th>Produtos</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>iPad</td>
                <td>R$3289,00</td>
                <td>5</td>
                <td>R$ 16.455,00</td>
            </tr>
            <tr>
                <td>Samsung S26</td>
                <td>R$ 5.500,00</td>
                <td>3</td>
                <td>R$ 16.500,00</td>
            </tr>
        </tbody>
        <tfoot>
            <td colspan="3">Total:</td>
            <td>R$ 32.955,00</td>
        </tfoot>
    </table>
</body>
</html>
